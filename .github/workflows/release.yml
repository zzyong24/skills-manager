name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Windows smoke check
        if: matrix.platform == 'windows-latest'
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build CLI binary
        shell: bash
        run: |
          cargo build --release --manifest-path src-tauri/Cargo.toml \
            --bin skills-manager-cli \
            --target ${{ matrix.target }}

          # Tauri externalBin 约定：src-tauri/binaries/<name>-<target-triple>[.exe]
          mkdir -p src-tauri/binaries
          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            cp "src-tauri/target/${{ matrix.target }}/release/skills-manager-cli.exe" \
               "src-tauri/binaries/skills-manager-cli-${{ matrix.target }}.exe"
          else
            cp "src-tauri/target/${{ matrix.target }}/release/skills-manager-cli" \
               "src-tauri/binaries/skills-manager-cli-${{ matrix.target }}"
          fi

      - name: Upload CLI binary as release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            ASSET="src-tauri/binaries/skills-manager-cli-${{ matrix.target }}.exe"
            ASSET_NAME="skills-manager-cli-${{ matrix.label }}.exe"
          else
            ASSET="src-tauri/binaries/skills-manager-cli-${{ matrix.target }}"
            ASSET_NAME="skills-manager-cli-${{ matrix.label }}"
          fi
          gh release upload "v${VERSION}" "${ASSET}#${ASSET_NAME}" --clobber

      - name: Extract changelog for current version
        id: changelog
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BODY_EN=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{ /^## \[${VERSION}\]/d; /^## \[/d; p; }" CHANGELOG.md)
          BODY_ZH=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{ /^## \[${VERSION}\]/d; /^## \[/d; p; }" CHANGELOG-zh.md)
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY_EN" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "---" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "<details><summary>中文更新日志</summary>" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "$BODY_ZH" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "</details>" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "---" >> "$GITHUB_OUTPUT"
          echo "Full changelog: [English](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) | [中文](https://github.com/${{ github.repository }}/blob/main/CHANGELOG-zh.md)" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Skills Manager v__VERSION__'
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: false
          prerelease: false
          updaterJsonKeepUniversal: true
          args: --target ${{ matrix.target }}

  verify-updater-assets:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    name: Verify updater assets
    steps:
      - name: Validate updater metadata and signatures
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          api_url="https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}"
          release_json=$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$api_url")

          asset_names=$(echo "$release_json" | jq -r '.assets[]?.name')

          if ! echo "$asset_names" | grep -qx 'latest.json'; then
            echo "Missing updater metadata asset: latest.json"
            exit 1
          fi

          if ! echo "$asset_names" | grep -q '\.sig'; then
            echo "Missing updater signature assets (*.sig)"
            exit 1
          fi

          latest_url="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/latest.json"
          curl -fsSL "$latest_url" >/tmp/latest.json

          if ! jq -e 'has("platforms") and (.platforms | has("windows-x86_64"))' /tmp/latest.json >/dev/null; then
            echo "latest.json does not include windows-x86_64 updater entry"
            cat /tmp/latest.json
            exit 1
          fi

          if ! jq -e '.platforms["windows-x86_64"].signature and .platforms["windows-x86_64"].url' /tmp/latest.json >/dev/null; then
            echo "windows-x86_64 updater entry is missing signature/url"
            cat /tmp/latest.json
            exit 1
          fi

          echo "Updater assets validation passed"
